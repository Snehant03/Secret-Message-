<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Message</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#4b0082,#111);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:35px;
    border-radius:20px;
    width:90%;
    max-width:420px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin:15px 0;
    font-size:16px;
    text-align:center;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#message{
    display:none;
    font-size:22px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="box" id="login">
    <h2>🔒 Private Message</h2>
    <p><b>Question:</b><br>Mobile Password of mine ?</p>

    <input type="password" id="pass" placeholder="Enter Answer">
    <br>
    <button onclick="checkPassword()">Open</button>
</div>

<div class="box" id="message">
    <h2>❤️</h2>
    <p>
        I really miss you ❤️<br><br>
        and feeling alone & depressed without you,<br><br>
        please come as soon as possible 🥺
    </p>
</div>

<script>
function checkPassword(){
    const password = document.getElementById("pass").value;

    if(password === "1972"){
        document.getElementById("login").style.display="none";
        document.getElementById("message").style.display="block";
    }else{
        alert("❌ Incorrect password.");
        document.getElementById("pass").value="";
    }
}
</script>

</body>
</html>
